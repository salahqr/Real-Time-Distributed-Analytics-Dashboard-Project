spring.application.name=Kafka-Project
spring.kafka.bootstrap-servers=localhost:9092
server.port= 8080

spring.data.redis.host = localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout= 2000

spring.datasource.url=jdbc:clickhouse://localhost:8123/default
spring.datasource.username=default
spring.datasource.password=
spring.datasource.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

// application.properties - Add these
spring.kafka.bootstrap-servers=localhost:19092,localhost:19093,localhost:19094
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# For Kubernetes deployment
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-0.kafka-service:9092,kafka-1.kafka-service:9092,kafka-2.kafka-service:9092}